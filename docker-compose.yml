services:
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    environment:
      POSTGRES_DB: ewm_stats
      POSTGRES_USER: ewm
      POSTGRES_PASSWORD: ewm
    ports:
      - "6541:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewm -d ewm_stats"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - stats-db-data:/var/lib/postgresql/data

  stats-server:
    build:
      context: .
      dockerfile: server/ewm-stats-server/Dockerfile
    container_name: stats-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/ewm_stats
      SPRING_DATASOURCE_USERNAME: ewm
      SPRING_DATASOURCE_PASSWORD: ewm
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_LIQUIBASE_CHANGE_LOG: classpath:db/changelog/db.changelog-master.yaml

  # ---- Заготовки под main-service ----
  ewm-db:
    image: postgres:16.1
    profiles: ["main"]
    environment:
      POSTGRES_DB: ewm_main
      POSTGRES_USER: ewm
      POSTGRES_PASSWORD: ewm
    ports:
      - "6542:5432"
    volumes:
      - ewm-db-data:/var/lib/postgresql/data

  ewm-service:
    profiles: ["main"]
    # позже добавим build + env + depends_on
    ports:
      - "8080:8080"

volumes:
  stats-db-data:
  ewm-db-data:
